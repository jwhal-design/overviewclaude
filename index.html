<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>The OETT Team Presents</title>
<style>
  :root{
    --cream:#FBF0DA;
    --cream-2:#F3E4C7;
    --ink:#1c1a17;
    --crimson:#A01828;
    --crimson-lit:#C8203A;
    --blue:#1B3A8C;
    --gold:#E0A60E;
    --paper:#FFF8EC;
    --shadow:rgba(28,26,23,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--ink);
    font-family:"Helvetica Neue",Arial,sans-serif;
    color:var(--ink);
    overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }

  /* The "TV set" the whole thing plays inside */
  #tv{
    position:relative;
    width:100%;max-width:760px;
    height:100dvh;max-height:1040px;
    background:var(--cream);
    overflow:hidden;
    display:flex;flex-direction:column;
  }
  /* scanline + vignette overlay, the retro broadcast feel */
  #tv::after{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:50;
    background:
      radial-gradient(120% 100% at 50% 0%, transparent 60%, rgba(0,0,0,.18) 100%),
      repeating-linear-gradient(0deg, rgba(0,0,0,.035) 0 2px, transparent 2px 4px);
    mix-blend-mode:multiply;
  }

  /* ON AIR bug */
  #onair{
    position:absolute;top:14px;right:16px;z-index:40;
    font:700 11px/1 "Helvetica Neue",Arial,sans-serif;letter-spacing:.18em;
    color:var(--paper);background:var(--crimson);
    padding:6px 10px;border-radius:3px;
    display:flex;align-items:center;gap:7px;
    box-shadow:0 2px 0 rgba(0,0,0,.25);
  }
  #onair b{width:8px;height:8px;border-radius:50%;background:var(--paper);animation:blink 1.4s steps(1) infinite}
  @keyframes blink{50%{opacity:.15}}

  /* slide channel */
  .stage{flex:1;position:relative;overflow:hidden}
  .slide{
    position:absolute;inset:0;
    padding:54px 34px 30px;
    display:flex;flex-direction:column;
    opacity:0;transform:translateY(14px) scale(.99);
    transition:opacity .42s ease, transform .42s ease;
    pointer-events:none;
    overflow-y:auto;
  }
  .slide.live{opacity:1;transform:none;pointer-events:auto}

  /* the marker / handwritten accent — OETT brand uses a marker font; we fake the energy */
  .marker{
    font-family:"Bradley Hand","Comic Sans MS","Segoe Print",cursive;
    color:var(--crimson-lit);
    transform:rotate(-2.2deg);
    display:inline-block;
  }
  .kicker{
    font:800 12px/1 "Helvetica Neue",Arial,sans-serif;
    letter-spacing:.26em;text-transform:uppercase;color:var(--crimson);
    margin-bottom:14px;
  }
  h1{
    font:900 clamp(34px,9vw,62px)/.94 "Arial Black","Helvetica Neue",sans-serif;
    letter-spacing:-.02em;text-transform:uppercase;color:var(--ink);
  }
  h2{
    font:900 clamp(26px,6.5vw,44px)/1 "Arial Black","Helvetica Neue",sans-serif;
    letter-spacing:-.01em;text-transform:uppercase;color:var(--ink);margin-bottom:6px;
  }
  p{font-size:clamp(15px,3.6vw,18px);line-height:1.5;max-width:54ch}
  .lead{font-size:clamp(16px,4vw,20px);line-height:1.45}
  .small{font-size:13px;line-height:1.45;opacity:.72}

  /* Chett portrait framing */
  .chett{
    width:104px;height:104px;border-radius:50%;object-fit:cover;
    border:4px solid var(--ink);
    background:#0a0a14;
    box-shadow:0 0 0 2px #d11fb0, 0 0 14px rgba(42,180,255,.55), 0 6px 0 var(--shadow);
  }
  .chett-row{display:flex;align-items:center;gap:18px;margin-bottom:18px}
  .chett-row .name{font:900 18px/1 "Arial Black",sans-serif;text-transform:uppercase}
  .chett-row .title{font-size:13px;opacity:.7;margin-top:4px;max-width:24ch}

  /* Claude chiming in on a slide he isn't hosting — small CRT avatar + one line */
  .aside{
    display:flex;align-items:center;gap:13px;margin-top:16px;
    padding:11px 14px;border:2.5px solid var(--ink);border-radius:13px;
    background:#15111c;box-shadow:4px 5px 0 var(--shadow);
  }
  .aside img{
    width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;
    background:#0a0a14;
    box-shadow:0 0 0 2px #d11fb0, 0 0 10px rgba(42,180,255,.6);
  }
  .aside .q{color:#f4ecff;font-size:13.5px;line-height:1.38}
  .aside .q b{color:#46d0ff;font-weight:800;letter-spacing:.02em}

  /* compact speaker chip: small CRT avatar + name, sits directly above a speech bubble */
  .speaker{display:flex;align-items:center;gap:11px;margin-bottom:10px}
  .speaker img{
    width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;
    background:#0a0a14;border:3px solid var(--ink);
    box-shadow:0 0 0 2px #d11fb0, 0 0 11px rgba(42,180,255,.55);
  }
  .speaker .nm{font:900 14px/1 "Arial Black",sans-serif;text-transform:uppercase;letter-spacing:.02em}
  .speaker .nm span{display:block;font:600 11px/1.2 "Helvetica Neue",sans-serif;text-transform:none;letter-spacing:0;opacity:.62;margin-top:3px}

  .speech{
    background:var(--paper);border:3px solid var(--ink);
    border-radius:18px;padding:16px 18px;position:relative;
    box-shadow:5px 6px 0 var(--shadow);
    font-size:clamp(15px,3.8vw,18px);line-height:1.45;
  }
  .speech::before{
    content:"";position:absolute;left:34px;top:-15px;
    border:8px solid transparent;border-bottom-color:var(--ink);
  }
  .speech::after{
    content:"";position:absolute;left:36px;top:-9px;
    border:6px solid transparent;border-bottom-color:var(--paper);
  }

  .spacer{flex:1}

  /* "as seen on tv" claim badges — the real grant facts disguised as infomercial promises */
  .claim{
    border:3px solid var(--ink);background:var(--paper);
    border-radius:14px;padding:14px 16px;margin-bottom:12px;
    box-shadow:4px 5px 0 var(--shadow);
    display:flex;gap:14px;align-items:flex-start;
  }
  .claim .fig{
    font:900 clamp(24px,7vw,38px)/1 "Arial Black",sans-serif;
    color:var(--crimson-lit);white-space:nowrap;
  }
  .claim .blue{color:var(--blue)}
  .claim .gold{color:var(--gold)}
  .claim .txt strong{display:block;font:800 14px/1.2 "Helvetica Neue",sans-serif;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
  .claim .txt span{font-size:14px;line-height:1.4}

  /* timeline */
  .tl{list-style:none;margin-top:14px}
  .tl li{
    display:flex;gap:14px;padding:11px 0;border-bottom:2px dashed rgba(28,26,23,.22);
    font-size:clamp(14px,3.6vw,17px);line-height:1.35;
  }
  .tl li:last-child{border-bottom:0}
  .tl .yr{font:900 15px/1 "Arial Black",sans-serif;color:var(--blue);min-width:78px}

  /* fine print gag */
  .fineprint{
    margin-top:auto;font-size:10.5px;line-height:1.4;opacity:.6;
    border-top:1.5px solid rgba(28,26,23,.25);padding-top:10px;
  }

  /* steps for the closing slide */
  .step{display:flex;gap:14px;margin-bottom:16px;align-items:flex-start}
  .step .n{
    font:900 22px/1 "Arial Black",sans-serif;color:var(--paper);
    background:var(--crimson);width:42px;height:42px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:0 3px 0 var(--shadow);
  }
  .step .b strong{display:block;font:800 16px/1.2 "Helvetica Neue",sans-serif;margin-bottom:3px}
  .step .b span{font-size:14px;line-height:1.4;opacity:.85}

  /* controls / channel changer */
  #bar{
    position:relative;z-index:30;
    display:flex;align-items:center;gap:12px;
    padding:14px 18px;border-top:3px solid var(--ink);
    background:var(--cream-2);
  }
  .btn{
    font:800 14px/1 "Helvetica Neue",sans-serif;letter-spacing:.04em;
    border:3px solid var(--ink);background:var(--paper);color:var(--ink);
    padding:13px 18px;border-radius:11px;cursor:pointer;
    box-shadow:3px 4px 0 var(--shadow);transition:transform .08s, box-shadow .08s;
    text-transform:uppercase;
  }
  .btn:active{transform:translate(3px,4px);box-shadow:0 0 0 var(--shadow)}
  .btn.primary{background:var(--crimson);color:var(--paper);border-color:var(--ink)}
  .btn:disabled{opacity:.32;cursor:default;box-shadow:none;transform:none}
  .btn:focus-visible{outline:3px solid var(--blue);outline-offset:2px}

  /* channel dots */
  #dots{display:flex;gap:7px;flex:1;justify-content:center;flex-wrap:wrap}
  .dot{
    width:11px;height:11px;border-radius:50%;
    border:2px solid var(--ink);background:transparent;cursor:pointer;padding:0;
  }
  .dot.on{background:var(--crimson)}
  .dot:focus-visible{outline:2px solid var(--blue);outline-offset:2px}

  .ch{font:800 12px/1 "Helvetica Neue",sans-serif;letter-spacing:.1em;opacity:.6;white-space:nowrap}

  /* opening "static" tune-in animation */
  #tunein{
    position:absolute;inset:0;z-index:60;background:var(--ink);
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;
    transition:opacity .5s ease;
  }
  #tunein.gone{opacity:0;pointer-events:none}
  #tunein .big{
    font:900 clamp(40px,12vw,84px)/.9 "Arial Black",sans-serif;color:var(--cream);
    text-transform:uppercase;letter-spacing:-.02em;text-align:center;
  }
  #tunein .big .marker{color:var(--gold)}
  #tunein .sub{color:var(--cream);opacity:.7;font-size:14px;letter-spacing:.2em;text-transform:uppercase}
  #tunein .tapnote{color:var(--crimson-lit);font:800 14px/1 "Helvetica Neue",sans-serif;letter-spacing:.16em;text-transform:uppercase;margin-top:8px;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.4}}

  @media (prefers-reduced-motion: reduce){
    .slide{transition:opacity .2s ease;transform:none!important}
    #onair b{animation:none}
    #tunein .tapnote{animation:none}
    .marker{transform:none}
  }
  @media (max-width:480px){
    .slide{padding:46px 20px 22px; justify-content:center}
    .slide.dense{justify-content:flex-start}
    .spacer{flex:0 0 18px}
    .chett{width:80px;height:80px}
    .chett-row{margin-bottom:14px}
    h1{font-size:38px}
    h2{font-size:30px}
    .speech{padding:14px 15px;font-size:16px}
    .speaker img{width:46px;height:46px}
    .kicker{margin-bottom:10px}
    #bar{padding:11px 12px;gap:8px}
    .btn{padding:12px 13px;font-size:13px}
    #dots{gap:5px;flex-wrap:nowrap}
    .dot{width:8px;height:8px;border-width:1.5px}
  }
  @media (max-width:360px){
    .btn{padding:11px 10px;font-size:12px}
    .dot{width:7px;height:7px}
  }
</style>
</head>
<body>
<div id="tv">
  <div id="onair"><b></b>ON AIR</div>

  <div class="stage" id="stage"></div>

  <div id="bar">
    <button class="btn" id="prev">◄ Back</button>
    <div id="dots"></div>
    <button class="btn primary" id="next">Next ►</button>
  </div>

  <div id="tunein">
    <div class="sub">Channel 40 · OETT-TV</div>
    <div class="big">The <span class="marker">$40,000</span><br>Question</div>
    <div class="sub" style="opacity:.55">your pre-show icebreaker · no standing up required</div>
    <div class="tapnote">▶ Tap to tune in</div>
  </div>
</div>

/* ---- engine ---- */
var stage=document.getElementById('stage');
var dotsWrap=document.getElementById('dots');
var prevBtn=document.getElementById('prev');
var nextBtn=document.getElementById('next');
var tunein=document.getElementById('tunein');
var i=0, started=false;

// build slides + dots
slides.forEach(function(s,idx){
  var el=document.createElement('section');
  el.className='slide';
  if(s.html.indexOf('class="claim"')>-1 || s.html.indexOf('class="step"')>-1 || s.html.indexOf('class="tl"')>-1){ el.className='slide dense'; }
  el.innerHTML=s.html;
  el.setAttribute('aria-hidden','true');
  stage.appendChild(el);

  var d=document.createElement('button');
  d.className='dot';
  d.setAttribute('aria-label','Go to channel '+(idx+1));
  d.addEventListener('click',function(){go(idx)});
  dotsWrap.appendChild(d);
});
var slideEls=[].slice.call(stage.children);
var dotEls=[].slice.call(dotsWrap.children);

function render(){
  slideEls.forEach(function(el,idx){
    var live=idx===i;
    el.classList.toggle('live',live);
    el.setAttribute('aria-hidden',live?'false':'true');
  });
  dotEls.forEach(function(d,idx){d.classList.toggle('on',idx===i)});
  prevBtn.disabled=(i===0);
  nextBtn.textContent=(i===slides.length-1)?'Restart ↺':'Next ►';
  document.getElementById('onair').firstChild.nextSibling; // noop guard
}
function go(n){
  if(n<0||n>=slides.length){return}
  i=n; render();
  slideEls[i].scrollTop=0;
}
function next(){ if(i===slides.length-1){go(0)} else {go(i+1)} }
function prev(){ go(i-1) }

nextBtn.addEventListener('click',next);
prevBtn.addEventListener('click',prev);

document.addEventListener('keydown',function(e){
  if(!started){return}
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();next()}
  if(e.key==='ArrowLeft'){e.preventDefault();prev()}
});

function start(){
  if(started){return}
  started=true;
  tunein.classList.add('gone');
  render();
}
tunein.addEventListener('click',start);

// init (hidden until tune-in)
render();
prevBtn.disabled=true;
</script>
